<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Workspace - Reuniverse</title>
  <meta name="description" content="A full Reuniverse workspace with a ZenHub-style work tracker, issue creation, drag-and-drop pipelines, and issue detail editing.">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="workspace-page">

  <header class="site-header">
    <div class="wrap">
      <a href="index.html" class="brand" aria-label="Reuniverse home">
        <svg class="brand-mark" viewBox="0 0 32 32" aria-hidden="true">
          <circle cx="16" cy="16" r="13" fill="#0b3d91"/>
          <path d="M5 19c5-7 17-9 22-3" fill="none" stroke="#f9aa43" stroke-width="2" stroke-linecap="round"/>
          <circle cx="20" cy="10" r="2" fill="#ffffff"/>
          <circle cx="12" cy="22" r="1.3" fill="#ffffff"/>
        </svg>
        Reuniverse
      </a>
      <nav class="nav" aria-label="Primary">
        <a href="index.html">Home</a>
        <a href="concept.html">Concept</a>
        <a href="demo.html">Try It</a>
        <a href="workspace.html" aria-current="page">Workspace</a>
      </nav>
    </div>
  </header>

  <main>

    <section class="workspace-page-section">
      <div class="workspace-shell">
        <article class="workspace-app" aria-live="polite">
          <div class="workspace-app-header">
            <div class="workspace-heading">
              <img
                class="workspace-thumb"
                src="images/nebula-1x.jpg"
                srcset="images/nebula-1x.jpg 1x, images/nebula-2x.jpg 2x"
                width="96" height="72"
                alt="A compact NASA nebula image used as the workspace planet reference.">
              <div>
                <p class="eyebrow">Active planet</p>
                <h1 class="workspace-title">Planet workspace</h1>
                <p class="workspace-subtitle"></p>
              </div>
            </div>
            <a class="btn" href="demo.html">Create another planet</a>
          </div>

          <div class="workspace-summary">
            <div>
              <span class="identity-label">Body</span>
              <strong class="workspace-body-name"></strong>
            </div>
            <div>
              <span class="identity-label">Stage</span>
              <strong class="workspace-stage"></strong>
            </div>
            <div>
              <span class="identity-label">Stars</span>
              <strong class="workspace-stars"></strong>
            </div>
          </div>

          <form class="issue-composer" id="issue-form" autocomplete="off">
            <div>
              <label for="issue-title">New issue</label>
              <input id="issue-title" name="issue-title" type="text" placeholder="e.g. Draft protocol README">
            </div>
            <div>
              <label for="issue-pipeline">Pipeline</label>
              <select id="issue-pipeline" name="issue-pipeline">
                <option value="backlog">Backlog</option>
                <option value="planning">Planning</option>
                <option value="building">Building</option>
                <option value="review">Review</option>
                <option value="live">Live</option>
              </select>
            </div>
            <button class="btn btn-primary" type="submit">Create issue</button>
          </form>

          <p class="workspace-status" id="workspace-status" aria-live="polite"></p>

          <div class="workspace-body">
            <div class="kanban-preview" id="workspace-board" aria-label="Workspace board preview"></div>

            <aside class="issue-detail" id="issue-detail" aria-label="Issue detail editor" hidden>
              <div class="issue-detail-empty" hidden></div>
              <form class="issue-detail-form" id="issue-detail-form" hidden>
                <div>
                  <p class="eyebrow">Issue detail</p>
                  <h3 class="detail-heading">Native workspace issue</h3>
                </div>
                <div>
                  <label for="detail-title">Title</label>
                  <input id="detail-title" name="detail-title" type="text">
                </div>
                <div>
                  <label for="detail-body">Description</label>
                  <textarea id="detail-body" name="detail-body" rows="5"></textarea>
                </div>
                <div class="detail-grid">
                  <div>
                    <label for="detail-type">Type</label>
                    <select id="detail-type" name="detail-type">
                      <option value="Draft">Draft</option>
                      <option value="Issue">Issue</option>
                      <option value="Task">Task</option>
                      <option value="Bug">Bug</option>
                      <option value="Enhancement">Enhancement</option>
                      <option value="Epoch">Epoch</option>
                      <option value="Signal">Signal</option>
                    </select>
                  </div>
                  <div>
                    <label for="detail-points">Points</label>
                    <input id="detail-points" name="detail-points" type="number" min="0" max="40" step="1">
                  </div>
                  <div>
                    <label for="detail-pipeline">Pipeline</label>
                    <select id="detail-pipeline" name="detail-pipeline">
                      <option value="backlog">Backlog</option>
                      <option value="planning">Planning</option>
                      <option value="building">Building</option>
                      <option value="review">Review</option>
                      <option value="live">Live</option>
                    </select>
                  </div>
                </div>
                <div class="detail-actions">
                  <button class="btn btn-primary" type="submit">Save changes</button>
                  <button class="btn danger-btn" id="delete-issue-btn" type="button">Delete issue</button>
                </div>
              </form>
            </aside>
          </div>
        </article>
      </div>
    </section>

  </main>

  <footer class="site-footer">
    <div class="wrap">
      <p>
        <strong>Reuniverse</strong> &middot; Workspace prototype for a web design final project.
      </p>
      <p>
        Body data from
        <a href="https://exoplanetarchive.ipac.caltech.edu">NASA Exoplanet Archive</a> and
        <a href="https://ssd.jpl.nasa.gov/sbdb.cgi">JPL Small-Body Database</a>.
      </p>
    </div>
  </footer>

  <script src="data/bodies.js"></script>
  <script src="js/workspace.js"></script>
</body>
</html>
