<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Yixia Yu</title>
    <style>
      body {
        background-color: #f0f0f5;
        font-family: Georgia, 'Times New Roman', serif;
        margin: 0;
        padding: 40px 20px;
      }

      h1 {
        color: #57068c;
        text-align: center;
        font-family: 'Helvetica Neue', Arial, sans-serif;
        font-size: 2em;
        margin-bottom: 10px;
      }

      /* SVG Logo Styles */
      .logo {
        display: block;
        margin: 30px auto;
      }

      /* SVG transition for smooth hover effects */
      svg a circle,
      svg a polygon,
      svg a line,
      svg a path,
      svg a text {
        transition: all 0.3s ease;
      }

      svg a {
        cursor: pointer;
      }

      /* Sun hover: glow bigger and brighter */
      svg a:hover .sun {
        fill: #ffe066;
        r: 30;
        filter: drop-shadow(0 0 10px #f5c542);
      }

      svg a:active .sun {
        fill: #cc9900;
        r: 22;
      }

      /* Sun rays hover: thicker, brighter, longer */
      svg a:hover .sun-rays {
        stroke: #ffe680;
        stroke-width: 4;
        opacity: 1;
      }

      svg a:active .sun-rays {
        stroke: #cc9900;
        stroke-width: 1;
      }

      /* Sun glow hover */
      svg a:hover .sun-glow {
        fill: #f5c54260;
        r: 45;
      }

      /* Island hover: sand lights up, lifts slightly */
      svg a:hover .island-shape {
        fill: #e8b87a;
        filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
        transform: translateY(-3px);
      }

      svg a:active .island-shape {
        fill: #a07040;
        transform: translateY(1px);
      }

      /* Island highlight hover */
      svg a:hover .island-highlight {
        fill: #f0c88a;
        opacity: 0.7;
      }

      /* Tree trunk hover: lighten */
      svg a:hover .tree-trunk {
        stroke: #a07020;
        stroke-width: 6;
      }

      svg a:active .tree-trunk {
        stroke: #4a3010;
      }

      /* Tree leaf hover: brighten green */
      svg a:hover .tree-leaf {
        stroke: #40c060;
        stroke-width: 4;
      }

      svg a:active .tree-leaf {
        stroke: #1a6030;
      }
    </style>
  </head>
  <body>
    <h1>Introduction to Web Design</h1>
    <p style="color: #555; font-size: 18px; text-align: center; max-width: 700px; margin: 0 auto 30px auto;">Hello, my name is Yixia Yu. I am a junior majoring in Math and Computer Science. I am a student learning web design and development.</p>

    </svg>
